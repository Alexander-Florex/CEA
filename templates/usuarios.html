<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla de Usuarios - CEA Cursos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/usuarios.css">
</head>
<body>
    <!-- Fondo animado -->
    <div class="animated-background"></div>
    
    <!-- Partículas flotantes -->
    <div class="particles" id="particles"></div>
    
    <!-- Contenido principal -->
    <div class="container">
        <!-- Encabezado -->
        <header class="header">
            <div class="logo-container">
                <img src="/static/img/Logo.png" alt="CEA Cursos" class="logo">
                <div class="brand-text">
                    <h1>CEA CURSOS</h1>
                    <p>Administración de Usuarios</p>
                </div>
            </div>
            
            <div class="user-menu">
                <img src="img/user-avatar.jpg" alt="Usuario" class="user-avatar">
            </div>
        </header>
        
        <!-- Contenedor de la tabla -->
        <div class="table-container">
            <!-- Barra de herramientas -->
            <div class="toolbar">
                <h2 class="page-title">Tabla de Usuarios</h2>
                
                <div class="actions">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Buscar..." id="searchInput">
                    </div>
                    
                    <button class="btn btn-primary" id="newUserBtn">
                        <i class="fas fa-plus"></i> Nuevo Usuario
                    </button>
                </div>
            </div>
            
            <!-- Tabla -->
            <div class="table-wrapper">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>ID <i class="fas fa-sort"></i></th>
                            <th>Nombre <i class="fas fa-sort"></i></th>
                            <th>Apellido <i class="fas fa-sort"></i></th>
                            <th>Usuario <i class="fas fa-sort"></i></th>
                            <th>Contraseña <i class="fas fa-sort"></i></th>
                            <th>Correo <i class="fas fa-sort"></i></th>
                            <th>Rol <i class="fas fa-sort"></i></th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Los datos se cargarán dinámicamente con JavaScript -->
                        <tr class="empty-row">
                            <td colspan="8" class="empty-message">No hay usuarios registrados</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Botón de volver a inicio flotante -->
    <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Volver
    </button>
    
    <!-- Modal para nuevo usuario -->
    <div class="modal" id="userModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Nuevo Usuario</h3>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            
            <form id="userForm">
                <div class="form-group">
                    <label for="firstName">Nombre</label>
                    <input type="text" id="firstName" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="lastName">Apellido</label>
                    <input type="text" id="lastName" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="role">Rol</label>
                    <select id="role" class="form-control" required>
                        <option value="">Seleccionar rol</option>
                        <option value="admin">Administrador</option>
                        <option value="personal">Personal</option>
                        <option value="avanzado">Avanzado</option>
                    </select>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" id="cancelBtn">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
    <script src="/static/js/usuarios.js"></script>
</body>
</html>
